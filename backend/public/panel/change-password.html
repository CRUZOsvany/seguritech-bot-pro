<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SegurITech · Cambiar contraseña</title>
  <link rel="stylesheet" href="/panel/_shared.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .change-card { width: 420px; padding: 32px; }
    .change-card h1 { margin-bottom: 8px; }
    .change-card .muted { margin-bottom: 24px; }
    .change-card .field { margin-bottom: 16px; }
    .change-card .field label { display:block; margin-bottom: 4px; font-size: 13px; }
    .change-card .field input { width: 100%; padding: 10px; box-sizing: border-box; }
    .change-card button { width: 100%; padding: 12px; cursor: pointer; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card change-card">
    <h1>Cambiar contraseña</h1>
    <p class="muted">Tu cuenta exige rotar la contraseña antes de continuar.</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="current">Password actual</label>
      <input type="password" id="current" autocomplete="current-password" required>
    </div>
    <div class="field">
      <label for="new1">Password nueva</label>
      <input type="password" id="new1" autocomplete="new-password" required>
      <div class="hint">Mínimo 12 caracteres. Debe incluir mayúscula, minúscula y número.</div>
    </div>
    <div class="field">
      <label for="new2">Confirmar password</label>
      <input type="password" id="new2" autocomplete="new-password" required>
    </div>
    <button id="btn-change" class="btn-primary">Cambiar contraseña</button>
    <p class="muted" id="msg"></p>
  </div>

  <script>
    (function () {
      var $ = function (s) { return document.querySelector(s); };
      var msgEl = $('#msg');
      var msg = function (t, kind) {
        msgEl.textContent = t || '';
        msgEl.style.color = kind === 'error' ? 'var(--danger,#b91c1c)' : (kind === 'ok' ? '#16a34a' : '');
      };

      // Prellenar email desde query string
      try {
        var qsEmail = new URLSearchParams(window.location.search).get('email');
        if (qsEmail) $('#email').value = qsEmail;
      } catch (_) {}

      async function doChange() {
        msg('');
        var email = $('#email').value.trim();
        var current = $('#current').value;
        var n1 = $('#new1').value;
        var n2 = $('#new2').value;
        if (!email || !current || !n1 || !n2) {
          msg('Completa todos los campos', 'error');
          return;
        }
        if (n1 !== n2) {
          msg('Las contraseñas nuevas no coinciden', 'error');
          return;
        }
        if (n1.length < 12) {
          msg('Mínimo 12 caracteres', 'error');
          return;
        }

        var btn = $('#btn-change');
        btn.disabled = true;
        try {
          var res = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ email: email, currentPassword: current, newPassword: n1 }),
          });
          var data = {};
          try { data = await res.json(); } catch (_) {}
          if (!res.ok) {
            msg((data && data.error) || ('HTTP ' + res.status), 'error');
            return;
          }
          msg('Contraseña actualizada. Redirigiendo…', 'ok');
          setTimeout(function () {
            window.location.href = '/panel/login.html';
          }, 1200);
        } catch (err) {
          msg('Red caída: ' + (err && err.message), 'error');
        } finally {
          btn.disabled = false;
        }
      }

      $('#btn-change').addEventListener('click', doChange);
      ['email', 'current', 'new1', 'new2'].forEach(function (id) {
        $('#' + id).addEventListener('keypress', function (e) {
          if (e.key === 'Enter') doChange();
        });
      });
      ($('#email').value ? $('#current') : $('#email')).focus();
    })();
  </script>
</body>
</html>
