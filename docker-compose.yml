services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - WEBHOOK_PORT=3001
      - META_API_URL=https://graph.facebook.com/v21.0
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_TOKEN_ENCRYPTION_KEY=${META_TOKEN_ENCRYPTION_KEY}
      - BOT_NAME=SegurITech Bot Pro
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - CLOUDFLARE_ALLOWED_DOMAIN=${CLOUDFLARE_ALLOWED_DOMAIN}
    networks:
      - seguritech-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  seguritech-network:
    driver: bridge
